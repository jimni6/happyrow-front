<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Colored petal ellipses, no background -->
  <ellipse cx="100" cy="60" rx="26" ry="50" fill="#F97066" opacity="0.6" transform="rotate(0, 100, 100)"/>
  <ellipse cx="100" cy="60" rx="26" ry="50" fill="#FB923C" opacity="0.55" transform="rotate(90, 100, 100)"/>
  <ellipse cx="100" cy="60" rx="26" ry="50" fill="#FBBF24" opacity="0.45" transform="rotate(45, 100, 100)"/>
  <ellipse cx="100" cy="60" rx="26" ry="50" fill="#F97066" opacity="0.4" transform="rotate(135, 100, 100)"/>
  <!-- Bright center -->
  <circle cx="100" cy="100" r="12" fill="#1E293B" opacity="0.8"/>
</svg>
