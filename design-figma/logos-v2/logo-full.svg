<svg width="360" height="90" viewBox="0 0 360 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="warmGrad" x1="5" y1="5" x2="85" y2="85" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97066"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <!-- Icon (80x80) -->
  <rect x="5" y="5" width="80" height="80" rx="18" fill="url(#warmGrad)"/>

  <!-- Person left -->
  <circle cx="27" cy="31" r="5.6" fill="white"/>
  <path d="M17,53 C17,42 21,37 27,37 C33,37 37,42 37,53 Z" fill="white"/>

  <!-- Person center -->
  <circle cx="45" cy="27" r="7" fill="white"/>
  <path d="M33,53 C33,40 38,34 45,34 C52,34 57,40 57,53 Z" fill="white"/>

  <!-- Person right -->
  <circle cx="63" cy="31" r="5.6" fill="white"/>
  <path d="M53,53 C53,42 57,37 63,37 C69,37 73,42 73,53 Z" fill="white"/>

  <!-- Row curve -->
  <path d="M17,64 Q45,74 73,64" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Wordmark -->
  <text x="104" y="60"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="38"
        font-weight="700"
        letter-spacing="-0.5px">
    <tspan fill="#F97066">Happy</tspan><tspan fill="#1E293B">Row</tspan>
  </text>
</svg>
