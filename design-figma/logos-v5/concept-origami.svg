<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric origami diamond, no background -->
  <!-- Base diamond -->
  <polygon points="100,32 168,100 100,168 32,100" fill="#F97066" opacity="0.55"/>
  <!-- Top-right facet (light) -->
  <polygon points="100,32 168,100 100,100" fill="#FB923C" opacity="0.7"/>
  <!-- Bottom-right facet -->
  <polygon points="168,100 100,168 100,100" fill="#FBBF24" opacity="0.5"/>
  <!-- Bottom-left facet (shadow) -->
  <polygon points="100,168 32,100 100,100" fill="#1E293B" opacity="0.12"/>
  <!-- Fold line accent -->
  <line x1="32" y1="100" x2="168" y2="100" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="32" x2="100" y2="168" stroke="white" stroke-width="1.5" opacity="0.15"/>
</svg>
